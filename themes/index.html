<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="robots" content="noindex"/>
<title>InternNest — theme options</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>body{font-family:Inter,sans-serif;background:#0f172a;color:#fff;text-align:center;padding:60px 24px;margin:0}
h1{font-size:34px;margin:0 0 8px}p{color:#9aa6bd;margin:0 0 36px}
.grid{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;max-width:900px;margin:0 auto}
a.card{display:block;width:260px;padding:34px 24px;border-radius:18px;text-decoration:none;color:#fff;font-weight:800;font-size:20px;border:1px solid rgba(255,255,255,.15)}
.warm{background:linear-gradient(135deg,#faf8f3,#efe7d8);color:#0f172a}
.glass{background:linear-gradient(135deg,#c7b3ff,#8fd2ff,#ffe39c);color:#241a4d}
.dark{background:linear-gradient(135deg,#141b2e,#0b1020);border-color:#243049}
small{display:block;font-weight:500;font-size:13px;opacity:.75;margin-top:8px}</style></head>
<body><h1>Pick a homepage look</h1><p>Three directions for the InternNest homepage. Open each, then tell Jack which you want.</p>
<div class="grid">
<a class="card warm" href="/themes/warm/">Warm<small>Clean, current direction</small></a>
<a class="card glass" href="/themes/liquid-glass/">Liquid Glass<small>Frosted, striking, modern</small></a>
<a class="card dark" href="/themes/dark/">Dark<small>Premium, high-contrast</small></a>
</div></body></html>
